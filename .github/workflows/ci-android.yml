name: CI Android

on:
  push:
    branches:
      - develop
      - main
      - 'test-pr-*'
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.github/workflows/close-stale-issues.yml'
      - '.github/workflows/doxygen-gh-pages.yml'
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.github/workflows/close-stale-issues.yml'
      - '.github/workflows/doxygen-gh-pages.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_KVS_LOG_LEVEL: 3

permissions:
  contents: read

jobs:
  # ===========================================================================
  # arm64 — physical device
  # ===========================================================================

  android-arm64:
    runs-on: [self-hosted]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK}"
          NDK_BIN=$(ls -d "${ANDROID_NDK}/toolchains/llvm/prebuilt"/*/bin | head -1)
          export PATH="${NDK_BIN}:${PATH}"
          cmake -S superbuild -B build-android-arm64-v8a \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DBUILD_STATIC_LIBS=ON

      - name: Build
        run: |
          cmake --build build-android-arm64-v8a -j$(nproc)

      - name: Push and test
        run: |
          ADB="${ANDROID_HOME}/platform-tools/adb"
          SERIAL=$("${ADB}" devices | grep -v "^List" | grep "device$" | grep -v "emulator" | awk '{print $1}' | head -1)
          bash scripts/test-ci-android.sh --build-dir build-android-arm64-v8a --serial "${SERIAL}" --arch arm64-v8a

      - name: Cleanup
        if: always()
        run: rm -rf build-android-arm64-v8a

  android-arm64-asan:
    runs-on: [self-hosted]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK}"
          NDK_BIN=$(ls -d "${ANDROID_NDK}/toolchains/llvm/prebuilt"/*/bin | head -1)
          export PATH="${NDK_BIN}:${PATH}"
          cmake -S superbuild -B build-android-arm64-v8a-asan \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DBUILD_STATIC_LIBS=ON \
            -DADDRESS_SANITIZER=ON -DUNDEFINED_BEHAVIOR_SANITIZER=ON

      - name: Build
        run: |
          cmake --build build-android-arm64-v8a-asan -j$(nproc)

      - name: Push and test
        run: |
          ADB="${ANDROID_HOME}/platform-tools/adb"
          SERIAL=$("${ADB}" devices | grep -v "^List" | grep "device$" | grep -v "emulator" | awk '{print $1}' | head -1)
          bash scripts/test-ci-android.sh --build-dir build-android-arm64-v8a-asan --serial "${SERIAL}" --arch arm64-v8a --asan --ubsan

      - name: Cleanup
        if: always()
        run: rm -rf build-android-arm64-v8a-asan

  android-arm64-app:
    runs-on: [self-hosted]
    timeout-minutes: 15
    needs: android-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build APK
        run: |
          cd android-test-app
          ./gradlew assembleDebug assembleDebugAndroidTest \
            -Pandroid.injected.build.abi=arm64-v8a

      - name: Install and test
        run: |
          ADB="${ANDROID_HOME}/platform-tools/adb"
          SERIAL=$("${ADB}" devices | grep -v "^List" | grep "device$" | grep -v "emulator" | awk '{print $1}' | head -1)
          bash scripts/run-android-app-test.sh "${SERIAL}"

      - name: Cleanup
        if: always()
        run: rm -rf android-test-app/app/build android-test-app/.gradle

  # ===========================================================================
  # arm32 — physical device (armeabi-v7a)
  # ===========================================================================

  android-arm32:
    runs-on: [self-hosted]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK}"
          NDK_BIN=$(ls -d "${ANDROID_NDK}/toolchains/llvm/prebuilt"/*/bin | head -1)
          export PATH="${NDK_BIN}:${PATH}"
          cmake -S superbuild -B build-android-armeabi-v7a \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-26 \
            -DBUILD_STATIC_LIBS=ON

      - name: Build
        run: cmake --build build-android-armeabi-v7a -j$(nproc)

      - name: Push and test
        run: |
          ADB="${ANDROID_HOME}/platform-tools/adb"
          SERIAL=$("${ADB}" devices | grep -v "^List" | grep "device$" | grep -v "emulator" | awk '{print $1}' | head -1)
          bash scripts/test-ci-android.sh --build-dir build-android-armeabi-v7a --serial "${SERIAL}" --arch armeabi-v7a

      - name: Cleanup
        if: always()
        run: rm -rf build-android-armeabi-v7a

  android-arm32-asan:
    runs-on: [self-hosted]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK}"
          NDK_BIN=$(ls -d "${ANDROID_NDK}/toolchains/llvm/prebuilt"/*/bin | head -1)
          export PATH="${NDK_BIN}:${PATH}"
          # UBSAN excluded: Android Bionic calloc on arm32 returns 4-byte aligned
          # memory, triggering false alignment errors for structs with UINT64.
          cmake -S superbuild -B build-android-armeabi-v7a-asan \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-26 \
            -DBUILD_STATIC_LIBS=ON \
            -DADDRESS_SANITIZER=ON

      - name: Build
        run: cmake --build build-android-armeabi-v7a-asan -j$(nproc)

      - name: Push and test
        run: |
          ADB="${ANDROID_HOME}/platform-tools/adb"
          SERIAL=$("${ADB}" devices | grep -v "^List" | grep "device$" | grep -v "emulator" | awk '{print $1}' | head -1)
          bash scripts/test-ci-android.sh --build-dir build-android-armeabi-v7a-asan --serial "${SERIAL}" --arch armeabi-v7a --asan

      - name: Cleanup
        if: always()
        run: rm -rf build-android-armeabi-v7a-asan

  android-arm32-app:
    runs-on: [self-hosted]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build APK
        run: |
          cd android-test-app
          ./gradlew assembleDebug assembleDebugAndroidTest \
            -Pandroid.injected.build.abi=armeabi-v7a

      - name: Install and test
        run: |
          ADB="${ANDROID_HOME}/platform-tools/adb"
          SERIAL=$("${ADB}" devices | grep -v "^List" | grep "device$" | grep -v "emulator" | awk '{print $1}' | head -1)
          bash scripts/run-android-app-test.sh "${SERIAL}"

      - name: Cleanup
        if: always()
        run: rm -rf android-test-app/app/build android-test-app/.gradle
