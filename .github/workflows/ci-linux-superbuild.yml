name: CI Linux Superbuild

on:
  push:
    branches:
      - develop
      - main
      - 'test-pr-*'
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.github/workflows/close-stale-issues.yml'
      - '.github/workflows/doxygen-gh-pages.yml'
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.github/workflows/close-stale-issues.yml'
      - '.github/workflows/doxygen-gh-pages.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_KVS_LOG_LEVEL: 3

permissions:
  contents: read

jobs:
  superbuild-linux:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialise superbuild submodules
        run: |
          git submodule update --init \
            superbuild/openssl superbuild/libsrtp \
            superbuild/googletest

      - name: Build Docker image
        run: docker build -t webrtc-u24 -f .github/docker/ubuntu24.Dockerfile .

      - name: Configure + Build
        run: |
          docker run --rm --user $(id -u):$(id -g) \
            -v $PWD:/src -w /src \
            -e CMAKE_BUILD_PARALLEL_LEVEL=$(nproc) \
            -e AWS_KVS_LOG_LEVEL \
            webrtc-u24 bash -c "
              export CC=clang CXX=clang++
              cd superbuild
              cmake --preset linux-x64 -DENABLE_NATIVE_SCTP=ON
              cmake --build build-linux-x64 --parallel \$(nproc)
            "

      - name: Test
        run: |
          docker run --rm --user $(id -u):$(id -g) \
            -v $PWD:/src -w /src \
            -e AWS_KVS_LOG_LEVEL \
            webrtc-u24 bash -c "
              cd superbuild/build-linux-x64/sdk/tst
              timeout 600 ./webrtc_client_test --gtest_break_on_failure
            "

      - name: Cleanup
        if: always()
        run: rm -rf superbuild/build-linux-x64

      # ---------------------------------------------------------------
      # Sanitizers (native SCTP)
      # ---------------------------------------------------------------

      - name: ASAN + UBSAN build + test
        run: |
          docker run --rm --user $(id -u):$(id -g) \
            -v $PWD:/src -w /src \
            -e CMAKE_BUILD_PARALLEL_LEVEL=$(nproc) \
            -e AWS_KVS_LOG_LEVEL \
            -e ASAN_OPTIONS=detect_odr_violation=0:detect_leaks=1 \
            -e LSAN_OPTIONS=suppressions=/src/tst/suppressions/LSAN.supp \
            -e UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 \
            webrtc-u24 bash -c "
              export CC=clang CXX=clang++
              cd superbuild
              cmake --preset linux-x64 \
                -DENABLE_NATIVE_SCTP=ON \
                -DADDRESS_SANITIZER=ON \
                -DUNDEFINED_BEHAVIOR_SANITIZER=ON
              cmake --build build-linux-x64 --parallel \$(nproc)
              cd build-linux-x64/sdk/tst
              timeout 600 ./webrtc_client_test --gtest_break_on_failure
            "

      - name: Clean ASAN build
        if: always()
        run: rm -rf superbuild/build-linux-x64

      - name: TSAN build + test
        run: |
          docker run --rm --user $(id -u):$(id -g) \
            -v $PWD:/src -w /src \
            -e CMAKE_BUILD_PARALLEL_LEVEL=$(nproc) \
            -e AWS_KVS_LOG_LEVEL \
            -e TSAN_OPTIONS=second_deadlock_stack=1:halt_on_error=1:suppressions=/src/tst/suppressions/TSAN.supp \
            webrtc-u24 bash -c "
              export CC=clang CXX=clang++
              cd superbuild
              cmake --preset linux-x64 \
                -DENABLE_NATIVE_SCTP=ON \
                -DTHREAD_SANITIZER=ON
              cmake --build build-linux-x64 --parallel \$(nproc)
              cd build-linux-x64/sdk/tst
              timeout 600 ./webrtc_client_test --gtest_break_on_failure
            "

      - name: Clean TSAN build
        if: always()
        run: rm -rf superbuild/build-linux-x64
