name: CI Linux

on:
  push:
    branches:
      - develop
      - main
      - 'test-pr-*'
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.github/workflows/close-stale-issues.yml'
      - '.github/workflows/doxygen-gh-pages.yml'
  pull_request:
    branches:
      - develop
      - main
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - '.github/workflows/close-stale-issues.yml'
      - '.github/workflows/doxygen-gh-pages.yml'

env:
  AWS_KVS_LOG_LEVEL: 7

permissions:
  contents: read

jobs:
  linux:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t webrtc-u22 -f .github/docker/ubuntu22.Dockerfile . &
          docker build -t webrtc-u20 -f .github/docker/ubuntu20.Dockerfile . &
          docker build -t webrtc-alpine -f .github/docker/alpine.Dockerfile . &
          wait

      # ---------------------------------------------------------------
      # Fast checks (no build required)
      # ---------------------------------------------------------------

      - name: Stack size check - invalid value
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u22 bash -c "
            mkdir -p build-stack && cd build-stack
            set +e
            cmake .. -DKVS_STACK_SIZE=65536asdfsadf -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            cmake_exit_code=\$?
            set -e
            if [ \$cmake_exit_code -eq 0 ]; then
              echo 'CMake unexpectedly succeeded with invalid KVS_STACK_SIZE'
              exit 1
            fi
          "

      - name: Stack size check - valid value
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u22 bash -c "
            cd build-stack
            CMAKE_LOGS=\$(cmake .. -DKVS_STACK_SIZE=65536 -DBUILD_SAMPLE=OFF -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps 2>&1)
            if ! echo \"\$CMAKE_LOGS\" | grep -q 'Building with default stack size: 65536 bytes'; then
              echo 'Stack size was not sent to PIC properly. See the logs below:'
              echo \"\$CMAKE_LOGS\"
              exit 1
            fi
          "

      - name: Clean stack size build
        if: always()
        run: rm -rf build-stack

      # ---------------------------------------------------------------
      # Default settings build (samples included)
      # ---------------------------------------------------------------

      - name: Default settings build (GCC + OpenSSL + samples)
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u22 bash -c "
            export CC=gcc CXX=g++
            mkdir -p build-default && cd build-default
            cmake .. -DBUILD_TEST=ON -DENABLE_AWS_SDK_IN_TESTS=OFF -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
          "

      - name: Clean default build
        if: always()
        run: rm -rf build-default

      # ---------------------------------------------------------------
      # Gate: Alpine static build + test
      # ---------------------------------------------------------------

      - name: Alpine static GCC build + test
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-alpine bash -c "
            export CC=gcc CXX=g++
            mkdir -p build-alpine && cd build-alpine
            cmake .. -DBUILD_STATIC_LIBS=ON -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            timeout 600 ./tst/webrtc_client_test --gtest_break_on_failure
          "

      - name: Clean Alpine build
        if: always()
        run: rm -rf build-alpine

      # ---------------------------------------------------------------
      # Native builds + tests
      # ---------------------------------------------------------------

      - name: GCC + OpenSSL build + test
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u22 bash -c "
            export CC=gcc CXX=g++
            mkdir -p build-gcc-openssl && cd build-gcc-openssl
            cmake .. -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DUSE_OPENSSL=ON -DUSE_MBEDTLS=OFF \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            timeout 600 ./tst/webrtc_client_test --gtest_break_on_failure
          "

      - name: Clean GCC OpenSSL build
        if: always()
        run: rm -rf build-gcc-openssl

      - name: GCC + OpenSSL + stats-calc test
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u22 bash -c "
            export CC=gcc CXX=g++
            mkdir -p build-stats-calc && cd build-stats-calc
            cmake .. -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DENABLE_STATS_CALCULATION_CONTROL=ON \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            timeout 600 ./tst/webrtc_client_test --gtest_break_on_failure --gtest_filter='*MetricsApiTest*'
          "

      - name: Clean stats-calc build
        if: always()
        run: rm -rf build-stats-calc

      - name: Clang + MbedTLS build + test
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u22 bash -c "
            export CC=clang CXX=clang++
            mkdir -p build-clang-mbedtls && cd build-clang-mbedtls
            cmake .. -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DUSE_OPENSSL=OFF -DUSE_MBEDTLS=ON \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            timeout 600 ./tst/webrtc_client_test --gtest_break_on_failure
          "

      - name: Clean Clang MbedTLS build
        if: always()
        run: rm -rf build-clang-mbedtls

      - name: GCC 4.4 + old MbedTLS build + test
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u20 bash -c "
            export CC=gcc-4.4
            mkdir -p build-gcc44 && cd build-gcc44
            cmake .. -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DUSE_OPENSSL=OFF -DUSE_MBEDTLS=ON -DBUILD_OLD_MBEDTLS_VERSION=ON \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            timeout --signal=SIGABRT 600 ./tst/webrtc_client_test --gtest_break_on_failure
          "

      - name: Clean GCC 4.4 build
        if: always()
        run: rm -rf build-gcc44

      # ---------------------------------------------------------------
      # Sanitizers
      # ---------------------------------------------------------------

      - name: ASAN + UBSAN build + test
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src \
            -e ASAN_OPTIONS=detect_odr_violation=0:detect_leaks=1 \
            -e LSAN_OPTIONS=suppressions=/src/tst/suppressions/LSAN.supp \
            -e UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 \
            webrtc-u22 bash -c "
            export CC=clang CXX=clang++
            mkdir -p build-asan && cd build-asan
            cmake .. -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DADDRESS_SANITIZER=ON -DUNDEFINED_BEHAVIOR_SANITIZER=ON \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            timeout 600 ./tst/webrtc_client_test --gtest_break_on_failure
          "

      - name: Clean ASAN build
        if: always()
        run: rm -rf build-asan

      - name: TSAN build + test
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src \
            -e TSAN_OPTIONS=second_deadlock_stack=1:halt_on_error=1:suppressions=/src/tst/suppressions/TSAN.supp \
            webrtc-u22 bash -c "
            export CC=clang CXX=clang++
            mkdir -p build-tsan && cd build-tsan
            cmake .. -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DTHREAD_SANITIZER=ON \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            timeout 600 ./tst/webrtc_client_test --gtest_break_on_failure
          "

      - name: Clean TSAN build
        if: always()
        run: rm -rf build-tsan

      # ---------------------------------------------------------------
      # Cross-compilation
      # ---------------------------------------------------------------

      - name: Cross-compile mips-32 (static, OpenSSL)
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u22 bash -c "
            export CC=mips-linux-gnu-gcc CXX=mips-linux-gnu-g++
            mkdir -p build-cross-mips && cd build-cross-mips
            cmake .. -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DBUILD_STATIC_LIBS=ON -DUSE_OPENSSL=ON -DUSE_MBEDTLS=OFF \
                     -DBUILD_OPENSSL_PLATFORM=linux-mips32 \
                     -DBUILD_LIBSRTP_HOST_PLATFORM=x86_64-unknown-linux-gnu \
                     -DBUILD_LIBSRTP_DESTINATION_PLATFORM=mips-unknown-linux-gnu \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            file ./tst/webrtc_client_test
            file ./tst/webrtc_client_test | grep 'ELF 32-bit MSB executable, MIPS, MIPS32'
          "

      - name: Clean cross-compile mips build
        if: always()
        run: rm -rf build-cross-mips

      - name: Cross-compile arm-32 (static, OpenSSL)
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u22 bash -c "
            export CC=arm-linux-gnueabihf-gcc CXX=arm-linux-gnueabihf-g++
            mkdir -p build-cross-arm32 && cd build-cross-arm32
            cmake .. -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DBUILD_STATIC_LIBS=ON -DUSE_OPENSSL=ON -DUSE_MBEDTLS=OFF \
                     -DBUILD_OPENSSL_PLATFORM=linux-generic32 \
                     -DBUILD_LIBSRTP_HOST_PLATFORM=x86_64-unknown-linux-gnu \
                     -DBUILD_LIBSRTP_DESTINATION_PLATFORM=arm-unknown-linux-uclibcgnueabi \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            file ./tst/webrtc_client_test
            file ./tst/webrtc_client_test | grep 'ELF 32-bit LSB pie executable, ARM'
          "

      - name: Clean cross-compile arm32 build
        if: always()
        run: rm -rf build-cross-arm32

      - name: Cross-compile aarch64 (static, OpenSSL)
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u22 bash -c "
            export CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++
            mkdir -p build-cross-aarch64 && cd build-cross-aarch64
            cmake .. -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DBUILD_STATIC_LIBS=ON -DUSE_OPENSSL=ON -DUSE_MBEDTLS=OFF \
                     -DBUILD_OPENSSL_PLATFORM=linux-aarch64 \
                     -DBUILD_LIBSRTP_HOST_PLATFORM=x86_64-unknown-linux-gnu \
                     -DBUILD_LIBSRTP_DESTINATION_PLATFORM=arm-unknown-linux-uclibcgnueabi \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            file ./tst/webrtc_client_test
            file ./tst/webrtc_client_test | grep 'ELF 64-bit LSB pie executable, ARM'
          "

      - name: Clean cross-compile aarch64 build
        if: always()
        run: rm -rf build-cross-aarch64

      - name: Cross-compile aarch64 (static, MbedTLS spot-check)
        run: |
          docker run --rm --user $(id -u):$(id -g) -v $PWD:/src -w /src webrtc-u22 bash -c "
            export CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++
            mkdir -p build-cross-aarch64-mbedtls && cd build-cross-aarch64-mbedtls
            cmake .. -DBUILD_TEST=ON -DENABLE_SIGNALING=OFF -DENABLE_SELF_CONTAINED=ON -DENABLE_AWS_SDK_IN_TESTS=OFF \
                     -DBUILD_STATIC_LIBS=ON -DUSE_OPENSSL=OFF -DUSE_MBEDTLS=ON \
                     -DBUILD_OPENSSL_PLATFORM=linux-aarch64 \
                     -DBUILD_LIBSRTP_HOST_PLATFORM=x86_64-unknown-linux-gnu \
                     -DBUILD_LIBSRTP_DESTINATION_PLATFORM=arm-unknown-linux-uclibcgnueabi \
                     -DOPEN_SRC_INSTALL_PREFIX=\$(pwd)/deps
            make -j\$(nproc)
            file ./tst/webrtc_client_test
            file ./tst/webrtc_client_test | grep 'ELF 64-bit LSB pie executable, ARM'
          "

      - name: Clean cross-compile aarch64 MbedTLS build
        if: always()
        run: rm -rf build-cross-aarch64-mbedtls

