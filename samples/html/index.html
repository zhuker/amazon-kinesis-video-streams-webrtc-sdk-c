<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC webcam</title>
    <style>
    button {
        padding: 8px 16px;
    }

    video {
        width: 100%;
    }

    .option {
        margin-bottom: 8px;
    }

    </style>
</head>
<body>
<p>
    ICE gathering state: <span id="ice-gathering-state"></span>
</p>
<p>
    ICE connection state: <span id="ice-connection-state"></span>
</p>
<p>
    Signaling state: <span id="signaling-state"></span>
</p>
<p>
    Audio RED negotiated: <span id="audio-red-status">—</span>
</p>
<p>
    Audio packets: recv <span id="audio-packets-received">—</span>
    &nbsp; bytes <span id="audio-bytes-received">—</span>
    &nbsp; avg <span id="audio-avg-packet-bytes">—</span> B/pkt
    &nbsp;|&nbsp; dedup'd <span id="audio-packets-discarded">—</span>
</p>
<p>
    Audio quality: concealedSamples <span id="audio-concealed-samples">—</span>
    &nbsp; concealmentEvents <span id="audio-concealment-events">—</span>
    &nbsp; packetsLost <span id="audio-packets-lost">—</span>
</p>
<p>
    Data channel:
</p>
<pre id="data-channel" style="height: 200px; overflow-y: scroll;"></pre>

<div class="option">
    <input id="use-stun" type="checkbox"/>
    <label for="use-stun">Use STUN server</label>
</div>
<button id="start" onclick="start()">Start</button>
<button id="stop" style="display: none" onclick="stop()">Stop</button>

<div id="media">
    <h2>Media</h2>

    <audio id="audio" autoplay="true"></audio>
    <video id="video" autoplay="true" playsinline="true"></video>
</div>

<script src="client.js"></script>
</body>
</html>
